name: release

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: number
      title:
        required: true
        type: string
      tag_name:
        required: true
        type: string
      draft:
        required: true
        type: boolean
      prerelease:
        required: true
        type: boolean
        default: false
      latest:
        required: true
        type: boolean
        default: true

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # for creating releases and uploading assets
      id-token: write # attest
      attestations: write # attest
      artifact-metadata: write # attest
    steps:
      - name: Download GitHub Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          skip-decompress: true
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: artifacts/*

      - name: Create Release and Upload Assets
        working-directory: artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: "${{ inputs.run_id }}"
          ANNOUNCEMENT_TITLE: "${{ inputs.title }}"
          TAG_NAME: "${{ inputs.tag_name }}"
          DRAFT_FLAG: "${{ inputs.draft && '--draft' || '' }}"
          PRERELEASE_FLAG: "${{ inputs.prerelease && '--prerelease' || '' }}"
          LATEST_FLAG: "${{ inputs.latest && '--latest' || '--latest=false' }}"
        run: |
          set -euo pipefail

          files=(*)
          if [[ ${#files[@]} -eq 0 || ${files[0]} == '*' ]]; then
            echo "No release assets found in artifacts/" >&2
            exit 1
          fi

          notes=$(cat <<EOF
          Refer to README.md for guidance on selecting and installing the version.

          These artifacts are built here: https://github.com/${REPO}/actions/runs/${RUN_ID}
          EOF
          )

          gh release create "${TAG_NAME}" "${files[@]}" \
            --repo "${REPO}" \
            --title "${ANNOUNCEMENT_TITLE}" \
            --notes "$notes" \
            ${DRAFT_FLAG} \
            ${PRERELEASE_FLAG} \
            ${LATEST_FLAG}
